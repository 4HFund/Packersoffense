/* ---------- field math (new waypoint engine) ---------- */
function getWaypointPos(waypoints, pct) {
  if (!waypoints || waypoints.length === 0) return null;
  if (waypoints.length === 1) return { x: waypoints[0].x, y: waypoints[0].y };
  if (pct <= waypoints[0].t) return { x: waypoints[0].x, y: waypoints[0].y };
  
  const last = waypoints[waypoints.length - 1];
  if (pct >= last.t) return { x: last.x, y: last.y };

  for (let i = 0; i < waypoints.length - 1; i++) {
    if (pct >= waypoints[i].t && pct <= waypoints[i+1].t) {
      const wp1 = waypoints[i];
      const wp2 = waypoints[i+1];
      const segmentPct = (pct - wp1.t) / (wp2.t - wp1.t);
      return {
        x: wp1.x + (wp2.x - wp1.x) * segmentPct,
        y: wp1.y + (wp2.y - wp1.y) * segmentPct
      };
    }
  }
}

function pos(playId, role, pct) {
  const defaultStart = { C:{x:200,y:200}, QB:{x:200,y:235}, RB:{x:245,y:245}, L_WR:{x:70,y:200}, R_WR:{x:330,y:200} };
  const play = PLAYS.find(p => p.id === playId);
  if (play && play.routes && play.routes[role]) {
    return getWaypointPos(play.routes[role], pct);
  }
  return defaultStart[role];
}

function ballPos(playId, pct){
  const t=pct/100;
  const qb=pos(playId,'QB',pct), c=pos(playId,'C',pct), rb=pos(playId,'RB',pct), lwr=pos(playId,'L_WR',pct), rwr=pos(playId,'R_WR',pct);
  switch(playId){
    case 1: if(t<0.35) return qb; { const p=(t-0.35)/0.65; return {x:qb.x+(lwr.x-qb.x)*p,y:qb.y+(lwr.y-qb.y)*p}; }
    case 2: if(t<0.45) return qb; { const p=(t-0.45)/0.55; return {x:qb.x+(rwr.x-qb.x)*p,y:qb.y+(rwr.y-qb.y)*p}; }
    case 3: if(t<0.3) return qb; if(t<0.7) return rb; { const p=(t-0.7)/0.3; return {x:rb.x+(rwr.x-rb.x)*p,y:rb.y+(rwr.y-rb.y)*p}; }
    case 4: if(t<0.3) return qb; if(t<0.7) return rb; { const p=(t-0.7)/0.3; return {x:rb.x+(lwr.x-rb.x)*p,y:rb.y+(lwr.y-rb.y)*p}; }
    case 5: if(t<0.2){ const p=t/0.2; return {x:c.x+(qb.x-c.x)*p,y:c.y+(qb.y-c.y)*p}; } return qb;
    case 6: if(t<0.30) return c; if(t<0.45){ const p=(t-0.30)/0.15; return {x:c.x+(qb.x-c.x)*p,y:c.y+(qb.y-c.y)*p}; } if(t<0.62){ const p=(t-0.45)/0.17; return {x:qb.x+(rb.x-qb.x)*p,y:qb.y+(rb.y-qb.y)*p}; } if(t<0.72) return rb; return lwr;
    case 7: if(t<0.45) return qb; { const p=(t-0.45)/0.55; return {x:qb.x+(lwr.x-qb.x)*p,y:qb.y+(lwr.y-qb.y)*p}; }
    case 8: if(t<0.2){ const p=t/0.2; return {x:c.x+(qb.x-c.x)*p,y:c.y+(qb.y-c.y)*p}; } if(t<0.3) return qb; return rb;
    case 9: if(t<0.25){ const p=t/0.25; return {x:c.x+(qb.x-c.x)*p,y:c.y+(qb.y-c.y)*p}; } return qb;
    case 10: if(t<0.45) return qb; { const p=(t-0.45)/0.55; return {x:qb.x+(lwr.x-qb.x)*p,y:qb.y+(lwr.y-qb.y)*p}; }
    default: return qb;
  }
}

function phaseText(playId, pct, animating){
  const t=pct/100;
  if(!animating) return "Tap RUN to play it";
  switch(playId){
    case 1: return t<0.35 ? "HUT — slot WR breaks inside" : "Quick throw inside. Go!";
    case 2: return t<0.45 ? "HUT — QB drops back" : "Deep ball down the sideline!";
    case 3: if(t<0.3) return "HUT — handoff LEFT"; if(t<0.7) return "RB sweeps left — run first!"; return "Throw? Before the line only!";
    case 4: if(t<0.3) return "HUT — handoff RIGHT"; if(t<0.7) return "RB sweeps right — run first!"; return "Throw? Before the line only!";
    case 5: if(t<0.2) return "Center snaps to QB"; if(t<0.35) return "QB fakes the handoff"; if(t<0.55) return "Sell it — RB runs away"; return "QB keeps it — go!";
    case 6: if(t<0.30) return "Left WR motions across"; if(t<0.45) return "Center snaps to QB"; if(t<0.62) return "QB hands right (fake)"; if(t<0.72) return "Hands BACK to the WR!"; return "Reverse — going left!";
    case 7: if(t<0.45) return "Both WRs slant middle"; return "Hit the first one open!";
    case 8: if(t<0.2) return "Center snaps to QB"; if(t<0.3) return "Handoff to the RB"; if(t<0.6) return "Sweep to the edge"; return "Turn it upfield!";
    case 9: if(t<0.25) return "Snap to QB out of the bunch"; if(t<0.5) return "Receivers scatter — QB reads"; return "QB runs the open lane (or throws)!";
    case 10: if(t<0.18) return "HUT — bunch bursts open"; if(t<0.45) return "Receivers break to grass"; return "Quick throw to the first one open!";
    default: return "Run it!";
  }
}

/* full route path for the live trail */
function routePath(playId, role){
  let d="";
  for(let i=0;i<=40;i++){ const pt=pos(playId, role, (i/40)*100); d += (i===0?"M":"L")+pt.x.toFixed(1)+" "+pt.y.toFixed(1)+" "; }
  return d;
}

/* ---------- audio ---------- */
function useSound(enabled){
  return (type)=>{
    if(!enabled) return;
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if(type==='click'){ osc.frequency.setValueAtTime(620,ctx.currentTime); gain.gain.setValueAtTime(0.04,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.07); osc.start(); osc.stop(ctx.currentTime+0.07); }
      else if(type==='whistle'){ const n=ctx.currentTime; osc.type='sine'; osc.frequency.setValueAtTime(1100,n); gain.gain.setValueAtTime(0,n); gain.gain.linearRampToValueAtTime(0.08,n+0.04); gain.gain.linearRampToValueAtTime(0.01,n+0.22); osc.start(n); osc.stop(n+0.22); }
    }catch(e){}
  };
}

/* ---------- Field component ---------- */
function Field({ play, pct, animating, showTrails }){
  const th=THEMES[play.theme];
  const stripes=[0,40,80,120,160,240,280];
  const b=ballPos(play.id, pct);

    <svg viewBox="0 0 400 300" style={{width:'100%',height:'100%',background:'linear-gradient(180deg,#0e2018 0%,#0a1712 100%)',display:'block'}}>
      {stripes.map(y=> <rect key={y} x="0" y={y} width="400" height="40" fill={(y/40)%2===0?'#0f231a':'#0c1d15'}/>)}
      <line x1="6" y1="0" x2="6" y2="300" stroke="#fff" strokeWidth="2" opacity="0.18"/>
      <line x1="394" y1="0" x2="394" y2="300" stroke="#fff" strokeWidth="2" opacity="0.18"/>
      <line x1="0" y1="120" x2="400" y2="120" stroke="#fff" strokeWidth="1" strokeDasharray="6 6" opacity="0.12"/>
      <line x1="0" y1="60" x2="400" y2="60" stroke="#fff" strokeWidth="1" strokeDasharray="6 6" opacity="0.12"/>
      <line x1="0" y1="200" x2="400" y2="200" stroke={th.ring} strokeWidth="2.5" strokeDasharray="4 3"/>
      <text x="392" y="194" fill={th.ring} fontSize="8" fontWeight="bold" textAnchor="end">LOS</text>
      <line x1="0" y1="150" x2="400" y2="150" stroke="#ef4444" strokeWidth="1.5" strokeDasharray="2 4" opacity="0.5"/>
      <text x="8" y="146" fill="#fca5a5" fontSize="7" fontWeight="bold">RUSH LINE (7 yd)</text>

      {showTrails && ['C','QB','RB','L_WR','R_WR'].map(role=>(
        <path key={'tr'+role} d={routePath(play.id, role)} fill="none"
          stroke={role==='QB'?th.ring:'#ffffff'} strokeOpacity={role==='QB'?0.7:0.28}
          strokeWidth={role==='QB'?2.4:1.6} className="trail" strokeLinecap="round"/>
      ))}

      {['C','QB','RB','L_WR','R_WR'].map(role=>{
        const p=pos(play.id, role, pct);
        const decoy=play.decoys.includes(role);
        const fill=role==='QB'?th.ring:decoy?'#52605b':'#ffffff';
        return (
          <g key={role}>
            {animating && <circle cx={p.x} cy={p.y} r="16" fill={th.ring} opacity="0.14"/>}
            <circle cx={p.x} cy={p.y} r="13" fill={fill} stroke="#0a1712" strokeWidth="2.5"/>
            <text x={p.x} y={p.y+3.5} fill={decoy?'#fff':'#0a1712'} fontSize="8.5" fontWeight="900" textAnchor="middle" style={{fontFamily:'Archivo'}}>{role.replace('_',' ')}</text>
          </g>
        );
      })}

      <g>
        <ellipse cx={b.x} cy={b.y} rx="8" ry="5.5" fill="#7a3f10" opacity="0.3"/>
        <ellipse cx={b.x} cy={b.y} rx="6.5" ry="4.5" fill="#a55a1a" stroke="#fff" strokeWidth="1"/>
        <line x1={b.x-3} y1={b.y} x2={b.x+3} y2={b.y} stroke="#fff" strokeWidth="1"/>
      </g>
    </svg>
  );
}

          <button className="press" onClick={prev} disabled={cur===0} style={{width:56,height:56,borderRadius:18,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',opacity:cur===0?.25:1}}><Icon n="left" s={28}/></button>
          <button className="press" onClick={()=>{setAnimating(a=>!a);beep('click');}} style={{flex:1,height:56,borderRadius:18,fontWeight:900,fontSize:17,textTransform:'uppercase',letterSpacing:'.05em',display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:animating?'#fff':'#0a0a0a',background:animating?'#dc2626':th.ring}}>{animating?<Icon n="reset"/>:<Icon n="play"/>}{animating?'Reset':'Run Play'}</button>
          <button className="press" onClick={next} disabled={cur===PLAYS.length-1} style={{width:56,height:56,borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',color:'#0a0a0a',background:cur===PLAYS.length-1?'#1e3a32':'var(--gold)',opacity:cur===PLAYS.length-1?.4:1}}><Icon n="right" s={28}/></button>
        </div>
        <div style={{maxWidth:640,margin:'10px auto 0',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          {PLAYS.map((pl,i)=>(
            <button key={pl.id} onClick={()=>open(i)} style={{height:8,borderRadius:999,transition:'all .2s',width:i===cur?22:8,background:i===cur?THEMES[pl.theme].ring:'#1e3a32',border:'none'}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
